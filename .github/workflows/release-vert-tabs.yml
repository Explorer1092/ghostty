name: Release vert-tabs

# Mirrors the upstream ghostty-org build-macos job (.github/workflows/
# release-tip.yml). Differences from upstream:
#   - runs on GitHub-hosted `macos-26` instead of `namespace-profile-
#     ghostty-macos-tahoe` (we don't have a namespacelabs subscription).
#   - cachix runs without an auth token (pulls upstream's nix cache
#     read-only; can't write back).
#   - no codesign / notarize / Sparkle signing key (we don't ship those
#     secrets in this fork).
#   - DMG built with `hdiutil` instead of `create-dmg` (no signing cert).
#   - publishes a per-commit prerelease to this repo's GitHub Releases
#     instead of uploading to Cloudflare R2 + Sparkle appcast.
# Everything else (nix develop, Sparkle 2.9.0 SPM bundle, Build GhosttyKit
# under ReleaseFast, Xcode 26.3, the Info.plist injection) follows
# upstream so the produced app matches what ghostty-org ships.

on:
  push:
    branches: [vert-tabs]
  workflow_dispatch:

concurrency:
  group: release-vert-tabs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-26
    timeout-minutes: 90
    # Only run in this fork. Stops downstream forks from accidentally
    # trying to publish releases under their own repo.
    if: github.repository == 'Explorer1092/ghostty'
    env:
      ZIG_LOCAL_CACHE_DIR: /Users/runner/zig/local-cache
      ZIG_GLOBAL_CACHE_DIR: /Users/runner/zig/global-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Important so that build number generation works
          fetch-depth: 0

      # Upstream uses namespacelabs/nscloud-cache-action keyed on
      # `xcode` + `/Users/runner/zig`. GitHub-hosted runners can't use
      # that, so we fall back to actions/cache@v4 for the Zig caches.
      # Xcode is preinstalled on macos-26 so we don't cache it.
      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: /Users/runner/zig
          key: zig-macos-26-${{ runner.arch }}-${{ hashFiles('build.zig', 'build.zig.zon') }}-${{ github.sha }}
          restore-keys: |
            zig-macos-26-${{ runner.arch }}-${{ hashFiles('build.zig', 'build.zig.zon') }}-
            zig-macos-26-${{ runner.arch }}-

      # TODO(tahoe): https://github.com/NixOS/nix/issues/13342
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true

      # Pulls upstream ghostty's nix cache so common store paths don't
      # have to be rebuilt locally. Read-only without an auth token,
      # which is what we want in a fork.
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ghostty

      - name: XCode Select
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Xcode Version
        run: xcodebuild -version

      # Setup Sparkle (verbatim from upstream).
      - name: Setup Sparkle
        env:
          SPARKLE_VERSION: 2.9.0
        run: |
          mkdir -p .action/sparkle
          cd .action/sparkle
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-for-Swift-Package-Manager.zip" > sparkle.zip
          unzip sparkle.zip
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Extract build metadata
        id: meta
        run: |
          GHOSTTY_BUILD=$(git rev-list --count HEAD)
          GHOSTTY_COMMIT=$(git rev-parse --short HEAD)
          GHOSTTY_COMMIT_LONG=$(git rev-parse HEAD)
          BUILD_NUMBER=${{ github.run_number }}
          BUNDLE_BASE="Ghostty-vert-tabs-build${BUILD_NUMBER}-${GHOSTTY_COMMIT}"
          {
            echo "ghostty_build=$GHOSTTY_BUILD"
            echo "ghostty_commit=$GHOSTTY_COMMIT"
            echo "ghostty_commit_long=$GHOSTTY_COMMIT_LONG"
            echo "build_number=$BUILD_NUMBER"
            echo "bundle_base=$BUNDLE_BASE"
            echo "tag=vert-tabs-build-${BUILD_NUMBER}"
          } >> "$GITHUB_OUTPUT"

      # GhosttyKit is the framework that is built from Zig for our native
      # Mac app to access. Build this in release mode. (Verbatim upstream.)
      - name: Build GhosttyKit
        run: nix develop -c zig build -Doptimize=ReleaseFast -Demit-macos-app=false

      # The native app is built with native XCode tooling. IMPORTANT:
      # this must NOT run in a Nix environment. Nix breaks xcodebuild so
      # this has to be run outside. (Same pattern as upstream.)
      #
      # We drop the codesigning flags because the fork has no Developer
      # ID cert. Otherwise the xcodebuild invocation matches upstream.
      - name: Build Ghostty.app
        run: |
          cd macos
          xcodebuild -target Ghostty -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            COMPILATION_CACHE_CAS_PATH=/Users/runner/Library/Developer/Xcode/DerivedData/CompilationCache.noindex \
            COMPILATION_CACHE_KEEP_CAS_DIRECTORY=YES

      # We inject the "build number" as simply the number of commits
      # since HEAD. This will be a monotonically always-increasing build
      # number that we use. (Upstream additionally sets SUPublicEDKey for
      # Sparkle signing; we don't have that secret in the fork.)
      - name: Update Info.plist
        env:
          GHOSTTY_BUILD: ${{ steps.meta.outputs.ghostty_build }}
          GHOSTTY_COMMIT: ${{ steps.meta.outputs.ghostty_commit }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :GhosttyCommit $GHOSTTY_COMMIT" "macos/build/Release/Ghostty.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GHOSTTY_BUILD" "macos/build/Release/Ghostty.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $GHOSTTY_COMMIT" "macos/build/Release/Ghostty.app/Contents/Info.plist"

      - name: Sanity-check the bundle
        run: |
          APP="macos/build/Release/Ghostty.app"
          test -d "$APP" || { echo "Ghostty.app not found"; exit 1; }
          test -x "$APP/Contents/MacOS/ghostty" || { echo "ghostty binary not found"; exit 1; }
          # Verify our new menu wired into MainMenu.nib
          if ! strings "$APP/Contents/Resources/MainMenu.nib" | grep -q "Tabs Position"; then
            echo "Menu wiring missing from MainMenu.nib"
            exit 1
          fi
          ls -la "$APP/Contents/MacOS/"

      # Zip up the app and symbols. (Upstream uses fixed names like
      # `ghostty-macos-universal.zip`; we use a per-build name so the
      # release tag's assets are uniquely identifiable.)
      - name: Zip App
        env:
          BUNDLE_BASE: ${{ steps.meta.outputs.bundle_base }}
        run: |
          cd macos/build/Release
          zip -9 -r --symlinks "../../../${BUNDLE_BASE}.zip" Ghostty.app
          if [ -d Ghostty.app.dSYM ]; then
            zip -9 -r --symlinks "../../../${BUNDLE_BASE}-dsym.zip" Ghostty.app.dSYM/
          fi
          cd ../../../
          shasum -a 256 "${BUNDLE_BASE}.zip" > "${BUNDLE_BASE}.zip.sha256"

      # Upstream uses `create-dmg` plus codesign identity. Since we
      # can't codesign, fall back to hdiutil + an Applications symlink.
      - name: Create DMG
        env:
          BUNDLE_BASE: ${{ steps.meta.outputs.bundle_base }}
          GHOSTTY_COMMIT: ${{ steps.meta.outputs.ghostty_commit }}
        run: |
          STAGE="$(mktemp -d)/dmg"
          mkdir -p "$STAGE"
          /usr/bin/ditto macos/build/Release/Ghostty.app "$STAGE/Ghostty.app"
          ln -s /Applications "$STAGE/Applications"
          /usr/bin/hdiutil create \
            -volname "Ghostty vert-tabs ${GHOSTTY_COMMIT}" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            -fs HFS+ \
            "${BUNDLE_BASE}.dmg"
          shasum -a 256 "${BUNDLE_BASE}.dmg" > "${BUNDLE_BASE}.dmg.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.bundle_base }}
          path: |
            ${{ steps.meta.outputs.bundle_base }}.zip
            ${{ steps.meta.outputs.bundle_base }}.zip.sha256
            ${{ steps.meta.outputs.bundle_base }}.dmg
            ${{ steps.meta.outputs.bundle_base }}.dmg.sha256
            ${{ steps.meta.outputs.bundle_base }}-dsym.zip
          retention-days: 90
          if-no-files-found: warn

      # Per-build prerelease. Upstream uploads a fixed "tip" tag + R2 +
      # Sparkle appcast; we just publish to the repo's GitHub Releases.
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: vert-tabs build ${{ steps.meta.outputs.build_number }} (${{ steps.meta.outputs.ghostty_commit }})
          target_commitish: ${{ steps.meta.outputs.ghostty_commit_long }}
          prerelease: true
          make_latest: false
          body: |
            Unsigned macOS build of the `vert-tabs` branch, produced by the same nix-based pipeline as upstream ghostty-org (see `.github/workflows/release-vert-tabs.yml`).

            - Commit: [`${{ steps.meta.outputs.ghostty_commit }}`](https://github.com/${{ github.repository }}/commit/${{ steps.meta.outputs.ghostty_commit_long }})
            - Build number: ${{ steps.meta.outputs.build_number }}
            - CFBundleVersion: `${{ steps.meta.outputs.ghostty_build }}`

            ## Install

            ```bash
            unzip ${{ steps.meta.outputs.bundle_base }}.zip
            xattr -dr com.apple.quarantine Ghostty.app
            mv Ghostty.app /Applications/Ghostty-vert.app
            ```

            Or open the `.dmg` and drag the app into `Applications`, then run `xattr -dr com.apple.quarantine /Applications/Ghostty.app` (or wherever you put it).

            **This build is unsigned and not notarized.** Gatekeeper will refuse to launch it until you remove the quarantine attribute. Only do that for builds you trust.

            ## What's in this branch

            - aflat's vertical tab sidebar (upstream PR [#10589](https://github.com/ghostty-org/ghostty/pull/10589))
            - Runtime control via **View → Tabs Position** (Top / Bottom / Left / Right / Hidden)
            - `set_tabs_position` keybind action (e.g. `keybind = cmd+shift+l=set_tabs_position:left`)
            - Per-window override; resets to `tabs-position` config on app restart
          files: |
            ${{ steps.meta.outputs.bundle_base }}.zip
            ${{ steps.meta.outputs.bundle_base }}.zip.sha256
            ${{ steps.meta.outputs.bundle_base }}.dmg
            ${{ steps.meta.outputs.bundle_base }}.dmg.sha256
            ${{ steps.meta.outputs.bundle_base }}-dsym.zip
